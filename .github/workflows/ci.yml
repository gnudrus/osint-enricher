name: CI - OSINT Enricher Health Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health-check:
    name: Tests, package and container health
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check Python syntax
        run: python -m compileall -q src tests

      - name: Run static analysis
        run: python -m ruff check src tests

      - name: Run tests with coverage
        run: python -m pytest -q --cov=src --cov-report=term-missing --cov-fail-under=65

      - name: Smoke-test command line entry points
        run: |
          python -m src.connectors.run --help
          python -m src.enrichment.run --help
          python -m src.alerting.run --help
          python -m src.report.run --help

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build container image
        run: docker build --tag osint-enricher:ci .

      - name: Start container
        run: docker run --detach --name osint-enricher-ci --publish 8000:8000 osint-enricher:ci

      - name: Verify API health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs osint-enricher-ci
          exit 1

      - name: Clean up container
        if: always()
        run: docker rm --force osint-enricher-ci 2>/dev/null || true
