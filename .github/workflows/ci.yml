name: CI - OSINT Enricher Health Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate project structure
        run: |
          echo "🔍 Validating essential project files..."
          test -f README.md || { echo "❌ ERROR: README.md missing"; exit 1; }
          test -f requirements.txt || { echo "❌ ERROR: requirements.txt missing"; exit 1; }
          test -d src || { echo "❌ ERROR: src/ directory missing"; exit 1; }
          test -d src/connectors || { echo "❌ ERROR: src/connectors/ missing"; exit 1; }
          test -d src/enrichment || { echo "❌ ERROR: src/enrichment/ missing"; exit 1; }
          test -d src/alerting || { echo "❌ ERROR: src/alerting/ missing"; exit 1; }
          test -d src/report || { echo "❌ ERROR: src/report/ missing"; exit 1; }
          test -d src/storage || { echo "❌ ERROR: src/storage/ missing"; exit 1; }
          test -d src/api || { echo "❌ ERROR: src/api/ missing"; exit 1; }
          echo "✅ All essential directories present"

      - name: Verify README language requirement
        run: |
          echo "🇮🇹 Checking for Italian quick-start guide..."
          if grep -q "Guida rapida (in italiano)" README.md; then
            echo "✅ Italian quick-start guide found in README.md"
          else
            echo "❌ ERROR: Missing 'Guida rapida (in italiano)' in README.md"
            exit 1
          fi

      - name: Validate Dockerfile
        run: |
          echo "� Dockerfile validation..."
          test -f Dockerfile || { echo "❌ ERROR: Dockerfile missing"; exit 1; }
          if grep -q "^FROM python:3.11-slim" Dockerfile; then
            echo "✅ Dockerfile uses correct base image"
          else
            echo "❌ ERROR: Dockerfile must start with FROM python:3.11-slim"
            exit 1
          fi
          if grep -q "COPY requirements.txt ." Dockerfile; then
            echo "✅ Dockerfile copies requirements correctly"
          else
            echo "❌ ERROR: Dockerfile missing COPY requirements.txt"
            exit 1
          fi

      - name: Check Python syntax of key files
        run: |
          echo "🐍 Checking Python syntax..."
          python -m py_compile src/api/main.py || { echo "❌ ERROR: Syntax error in src/api/main.py"; exit 1; }
          python -m py_compile src/enrichment/run.py || { echo "❌ ERROR: Syntax error in src/enrichment/run.py"; exit 1; }
          python -m py_compile src/connectors/run.py || { echo "❌ ERROR: Syntax error in src/connectors/run.py"; exit 1; }
          echo "✅ All key Python files have valid syntax"

      - name: Final success message
        run: |
          echo "🎉 OSINT Enricher health check PASSED!"
          echo "📊 Project structure: VALID"
          echo "📖 Documentation: ITALIAN COMPLIANT"
          echo "� Docker: CONFIGURED CORRECTLY"
          echo "🐍 Python: SYNTAX VALID"
          echo "✅ Repository is ready for professional showcase"
